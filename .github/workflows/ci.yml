name: OSS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: oss-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate OSS Safety + CLI Surface
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run OSS quality gates
        run: pnpm ci:oss
