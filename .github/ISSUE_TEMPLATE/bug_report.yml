name: Bug report
description: Report a reproducible bug in Neurcode CLI OSS.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide exact commands and sequence.
      placeholder: |
        1. pnpm install
        2. node packages/cli/dist/index.js ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: cli_version
    attributes:
      label: CLI version
      placeholder: 0.9.43

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: v20.x

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, CI/local, and any relevant context.
